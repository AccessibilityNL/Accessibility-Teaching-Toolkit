<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">

    <style>
      @font-face {
        font-family: Muli;
        src: url("{{ site.baseurl }}/assets/fonts/Muli-Italic.eot");
        src: url("{{ site.baseurl }}/assets/fonts/Muli-Italic.eot#iefix") format("embedded-opentype"),url("{{ site.baseurl }}/assets/fonts/Muli-Italic.woff2") format("woff2"),url("{{ site.baseurl }}/assets/fonts/Muli-Italic.woff") format("woff");
        font-weight: 400;
        font-style: italic
      }

      @font-face {
          font-family: Muli;
          src: url("{{ site.baseurl }}/assets/fonts/Muli-Regular.eot");
          src: url("{{ site.baseurl }}/assets/fonts/Muli-Regular.eot#iefix") format("embedded-opentype"),url("{{ site.baseurl }}/assets/fonts/Muli-Regular.woff2") format("woff2"),url("{{ site.baseurl }}/assets/fonts/Muli-Regular.woff") format("woff");
          font-weight: 400;
          font-style: normal
      }

      @font-face {
          font-family: Muli;
          src: url("{{ site.baseurl }}/assets/fonts/Muli-SemiBold.eot");
          src: url("{{ site.baseurl }}/assets/fonts/Muli-SemiBold.eot#iefix") format("embedded-opentype"),url("{{ site.baseurl }}/assets/fonts/Muli-SemiBold.woff2") format("woff2"),url("{{ site.baseurl }}/assets/fonts/Muli-SemiBold.woff") format("woff");
          font-weight: 600;
          font-style: normal
      }

      @font-face {
          font-family: Muli;
          src: url("{{ site.baseurl }}/assets/fonts/Muli-Bold.eot");
          src: url("{{ site.baseurl }}/assets/fonts/Muli-Bold.eot#iefix") format("embedded-opentype"),url("{{ site.baseurl }}/assets/fonts/Muli-Bold.woff2") format("woff2"),url("{{ site.baseurl }}/assets/fonts/Muli-Bold.woff") format("woff");
          font-weight: 700;
          font-style: normal
      }

      @font-face {
          font-family: Muli;
          src: url("{{ site.baseurl }}/assets/fonts/Muli-ExtraBold.eot");
          src: url("{{ site.baseurl }}/assets/fonts/Muli-ExtraBold.eot#iefix") format("embedded-opentype"),url("{{ site.baseurl }}/assets/fonts/Muli-ExtraBold.woff2") format("woff2"),url("{{ site.baseurl }}/assets/fonts/Muli-ExtraBold.woff") format("woff");
          font-weight: 800;
          font-style: normal
      }
    </style>
  </head>
  <body>
    {% include header.html %}
    <div class="body-content">
      <p class="bold"></p>
      {{ content }}
    </div>        
  </body>
</html>
